<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./projects/kalah/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalah Bot - Ethan Mader</title>

    <!-- Fetch shim: the React bundle calls /api/{initial,expand,play/*}.
         /api/initial reads the precomputed JSON from disk; the rest go to
         a Web Worker (kalah-worker.js) that runs the alpha-beta engine on
         a background thread. The UI stays at 60fps even during multi-
         second searches because no work happens on the main thread. -->
    <script>
      (function () {
        var _fetch = window.fetch.bind(window);

        // ----- Worker plumbing -----
        var _worker = null;
        var _nextId = 1;
        var _pending = new Map();

        function ensureWorker() {
          if (_worker) return _worker;
          _worker = new Worker("./projects/kalah/kalah-worker.js");
          _worker.onmessage = function (e) {
            var msg = e.data || {};
            var p = _pending.get(msg.id);
            if (!p) return;
            _pending.delete(msg.id);
            if ("error" in msg) p.reject(new Error(msg.error));
            else p.resolve(msg.result);
          };
          _worker.onerror = function (e) {
            // Hard worker error — fail every in-flight request so the
            // app doesn't hang waiting on responses that won't arrive.
            var err = new Error("kalah-worker error: " + (e.message || e));
            _pending.forEach(function (p) { p.reject(err); });
            _pending.clear();
          };
          return _worker;
        }

        function callEngine(method, args) {
          var w = ensureWorker();
          return new Promise(function (resolve, reject) {
            var id = _nextId++;
            _pending.set(id, { resolve: resolve, reject: reject });
            w.postMessage({ id: id, method: method, args: args });
          });
        }

        function jsonResponse(data, status) {
          return new Response(JSON.stringify(data), {
            status: status || 200,
            headers: { "Content-Type": "application/json" },
          });
        }

        function parseBody(init) {
          if (!init || init.body == null) return {};
          if (typeof init.body === "string") return JSON.parse(init.body);
          return init.body;
        }

        window.fetch = function (input, init) {
          var url = typeof input === "string" ? input : (input && input.url) || "";
          var path = url.split("?")[0];

          // GET /api/initial → precomputed initial tree (4-ply, depth-12).
          if (path === "/api/initial" || /\/api\/initial$/.test(path)) {
            return _fetch("./projects/kalah/initial_tree.json", init);
          }

          // POST /api/expand → alpha-beta expand. Worker keeps the search
          // off the UI thread; depth defaults to engine's EXPAND_DEPTH but
          // line-apply requests pass a smaller depth for snappier paste.
          if (/\/api\/expand$/.test(path)) {
            return callEngine("expandNode", parseBody(init))
              .then(function (r) { return jsonResponse(r); });
          }

          // POST /api/play/start → bot's opening sequence.
          if (/\/api\/play\/start$/.test(path)) {
            return callEngine("startPlay", undefined)
              .then(function (r) { return jsonResponse(r); });
          }

          // POST /api/play/move → user move + bot response chain.
          if (/\/api\/play\/move$/.test(path)) {
            return callEngine("userMove", parseBody(init))
              .then(function (r) {
                if (r && r.__status) {
                  var status = r.__status;
                  delete r.__status;
                  return jsonResponse(r, status);
                }
                return jsonResponse(r);
              });
          }

          return _fetch(input, init);
        };
      })();
    </script>
